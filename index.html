const shader = `

struct MouseData {
    mouse: vec2f,
    rightPressed: f32,
    leftPressed: f32,
    canvasSize: vec2f,
    mouseVelocity: vec2f,
};
struct AdditionalData {
    brushSize: f32,
};

struct Params {
    width: u32,
    height: u32,
};

@group(0) @binding(0)
var<uniform> mouseData : MouseData;

@group(0) @binding(1)
var<uniform> params : Params;

@group(0) @binding(2)
var<uniform> brush : vec4f;
@group(0) @binding(3)
var<uniform> additionalData : AdditionalData;

@group(1) @binding(0)
var velocityRead :
texture_2d<f32>;

@group(1) @binding(1)
var velocityWrite :texture_storage_2d<rgba16float, write>;


@group(1) @binding(2)
var velSampler : sampler;
@group(3) @binding(4)
var divergenceWrite : texture_storage_2d<r32float, write>;


@group(3) @binding(0)
var pressureRead : texture_2d<f32>;

@group(3) @binding(1)
var pressureWrite :
texture_storage_2d<r32float, write>;

@group(3) @binding(2)
var divergenceRead : texture_2d<f32>;

@group(3) @binding(3)
var pressureSampler : sampler;

@group(2) @binding(2)
var dyeSampler : sampler;



@group(2) @binding(0)
var dyeRead :
texture_2d<f32>;

@group(2) @binding(1)
var dyeWrite :
texture_storage_2d<rgba16float, write>;

struct VSOut {
    @builtin(position) pos : vec4f,
};

@vertex
fn vs(
    @builtin(vertex_index) i : u32
) -> VSOut {

    var positions = array<vec2f, 6>(
        vec2f(-1.0, -1.0),
        vec2f( 1.0, -1.0),
        vec2f(-1.0,  1.0),

        vec2f(-1.0,  1.0),
        vec2f( 1.0, -1.0),
        vec2f( 1.0,  1.0),
    );

    var out : VSOut;

    out.pos = vec4f(positions[i], 0.0, 1.0);

    return out;
}

@fragment
fn fs(
    @builtin(position) fragPos : vec4f
) -> @location(0) vec4f {

    let uv =
        fragPos.xy /
        mouseData.canvasSize;



    let c =
        textureSample(
            dyeRead,
            dyeSampler,
            uv
        );
    let b = textureSample(divergenceRead, pressureSampler, uv).x;
    let G = textureSampleLevel(pressureRead, pressureSampler, uv, 0.0).x;
    let d = textureSample(velocityRead, velSampler, uv);
    
    return c;
}

@compute @workgroup_size(8,8)
fn computeDivergence(
    @builtin(global_invocation_id)
    gid : vec3<u32>
) {

    if (
        gid.x >= params.width ||
        gid.y >= params.height
    ) {
        return;
    }

    let size =
        vec2f(
            f32(params.width),
            f32(params.height)
        );

    let uv =
        (vec2f(gid.xy) + 0.5) / size;

    let texel =
        1.0 / size;

    let leftVel =
        textureSampleLevel(
            velocityRead,
            velSampler,
            uv - vec2f(texel.x, 0.0),
            0.0
        ).xy;

    let rightVel =
        textureSampleLevel(
            velocityRead,
            velSampler,
            uv + vec2f(texel.x, 0.0),
            0.0
        ).xy;

    let bottomVel =
        textureSampleLevel(
            velocityRead,
            velSampler,
            uv - vec2f(0.0, texel.y),
            0.0
        ).xy;

    let topVel =
        textureSampleLevel(
            velocityRead,
            velSampler,
            uv + vec2f(0.0, texel.y),
            0.0
        ).xy;

    let divergence =
        (
            rightVel.x -
            leftVel.x +
            topVel.y -
            bottomVel.y
        ) * 0.5;

    textureStore(
        divergenceWrite,
        vec2i(gid.xy),
        vec4f(
            divergence,
            0.0,
            0.0,
            0.0
        )
    );
}


@compute @workgroup_size(8,8)
fn pressureSolve(
    @builtin(global_invocation_id)
    gid : vec3<u32>
) {

    if (
        gid.x >= params.width ||
        gid.y >= params.height
    ) {
        return;
    }

    let size =
        vec2f(
            f32(params.width),
            f32(params.height)
        );

    let uv =
        (vec2f(gid.xy) + 0.5) / size;

    let texel =
        1.0 / size;

    let left =
        textureSampleLevel(
            pressureRead,
            pressureSampler,
            uv - vec2f(texel.x, 0.0),
            0.0
        ).x;

    let right =
        textureSampleLevel(
            pressureRead,
            pressureSampler,
            uv + vec2f(texel.x, 0.0),
            0.0
        ).x;

    let bottom =
        textureSampleLevel(
            pressureRead,
            pressureSampler,
            uv - vec2f(0.0, texel.y),
            0.0
        ).x;

    let top =
        textureSampleLevel(
            pressureRead,
            pressureSampler,
            uv + vec2f(0.0, texel.y),
            0.0
        ).x;

    let divergence =
        textureSampleLevel(
            divergenceRead,
            pressureSampler,
            uv,
            0.0
        ).x;

    let pressure =
        (
            left +
            right +
            bottom +
            top -
            divergence
        ) * 0.25;

    textureStore(
        pressureWrite,
        vec2i(gid.xy),
        vec4f(
            pressure,
            0.0,
            0.0,
            0.0
        )
    );
}

@compute @workgroup_size(8, 8)
fn colorMix(
    @builtin(global_invocation_id)
    gid : vec3<u32>
) {
    let size =
        vec2f(
            f32(params.width),
            f32(params.height)
        );

    let uv =
        (vec2f(gid.xy) + 0.5) /
        size;

let texel =
    1.0 / vec2f(
        size
    );

let center = textureSampleLevel(dyeRead, dyeSampler, uv, 0.0);

let left   = textureSampleLevel(dyeRead, dyeSampler, uv - vec2f(texel.x, 0.0), 0.0);
let right  = textureSampleLevel(dyeRead, dyeSampler, uv + vec2f(texel.x, 0.0), 0.0);
let top    = textureSampleLevel(dyeRead, dyeSampler, uv + vec2f(0.0, texel.y), 0.0);
let bottom = textureSampleLevel(dyeRead, dyeSampler, uv - vec2f(0.0, texel.y), 0.0);

let alpha = 1.0; // how much old value stays
let beta = 4.0 + alpha;

let result =
    (left + right + top + bottom + alpha * center) / beta;} 





@compute @workgroup_size(8, 8)
fn advect(
    @builtin(global_invocation_id)
    gid : vec3<u32>
) {

    let size =
        vec2f(
            f32(params.width),
            f32(params.height)
        );
        
let texel =
    1.0 / vec2f(
        size
    );
    if (
        gid.x >= params.width ||
        gid.y >= params.height
    ) {
        return;
    }

    let uv =
        (vec2f(gid.xy) + 0.5) /
        size;

    let vel =
        textureSampleLevel(
            velocityRead,
            velSampler,
            uv,
            0.0
        ).xy;

    let dt = 0.016;

    let prevUV =
        clamp(
            uv - vel * dt * texel,
            vec2f(0.0),
            vec2f(1.0)
        );


    var dye =
        textureSampleLevel(
            dyeRead,
            dyeSampler,
            prevUV,
            0.0
        );

    var advectedVelocity = textureSampleLevel(velocityRead,velSampler,prevUV,0.0).xy;

    let mouseDiff =
        uv - mouseData.mouse;

    let distSq =
        dot(mouseDiff, mouseDiff);
        let pos =
    vec2i(
        i32(gid.x),
        i32(gid.y)
    );

    let radiusSq =
        additionalData.brushSize *
        additionalData.brushSize;

    let influence =
        select(
            0.0,
            1.0,
            distSq < radiusSq
        ) * mouseData.leftPressed;
    let rightInfluence =
        select(
            0.0,
            1.0,
            distSq < radiusSq
        ) * mouseData.rightPressed;
        
    let flexInfluence =
        select(
            0.0,
            1.0,
            distSq < radiusSq
        );
    dye =
        mix(
            dye,
            brush,
            influence
        );

    var finalVelocity =
        mix(
            advectedVelocity,
            mouseData.mouseVelocity * 2000.0,
            influence + rightInfluence
        );
    finalVelocity *= 0.99999;

    //let center = textureSampleLevel(dyeRead, dyeSampler, uv, 0.0);
    //let center = dye;
    //let left = textureSampleLevel(dyeRead, dyeSampler, uv - vec2f(texel.x, 0.0), 0.0);
    //let right = textureSampleLevel(dyeRead, dyeSampler, uv + vec2f(texel.x, 0.0), 0.0);
    //let top = textureSampleLevel(dyeRead, dyeSampler, uv + vec2f(0.0, texel.y), 0.0);
    //let bottom = textureSampleLevel(dyeRead, dyeSampler, uv - vec2f(0.0, texel.y), 0.0);
    //let avg = (center + left + right + top + bottom) / 5.0;
    //dye = mix(center, avg, 1);


    textureStore(
        dyeWrite,
        pos,
        dye
    );


    let vela =
    textureSampleLevel(
        velocityRead,
        velSampler,
        uv,
        0.0
    ).xy;



    
    textureStore(
        velocityWrite,
        pos,
        vec4f(
            finalVelocity,
            0.0,0.0
        )
    );

}

@compute @workgroup_size(8,8)
fn project(
    @builtin(global_invocation_id)
    gid : vec3<u32>
) {

    if (
        gid.x >= params.width ||
        gid.y >= params.height
    ) {
        return;
    }
    let size =
        vec2f(
            f32(params.width),
            f32(params.height)
        );

let texel =
    1.0 / vec2f(
        size
    );
    if (
        gid.x >= params.width ||
        gid.y >= params.height
    ) {
        return;
    }

    let uv =
        (vec2f(gid.xy) + 0.5) /
        size;

    
    var vel =
    textureSampleLevel(
        velocityRead,
        velSampler,
        uv,
        0.0
    ).xy;




    // NEIGHBOR PRESSURES
    let left =
        textureSampleLevel(
            pressureRead,
            pressureSampler,
            uv - vec2f(texel.x, 0.0),
            0.0
        ).x;

    let right =
        textureSampleLevel(
            pressureRead,
            pressureSampler,
            uv + vec2f(texel.x, 0.0),
            0.0
        ).x;

    let bottom =
        textureSampleLevel(
            pressureRead,
            pressureSampler,
            uv - vec2f(0.0, texel.y),
            0.0
        ).x;

    let top =
        textureSampleLevel(
            pressureRead,
            pressureSampler,
            uv + vec2f(0.0, texel.y),
            0.0
        ).x;

    // PRESSURE GRADIENT
    let gradient =
        vec2f(
            right - left,
            top - bottom
        ) * 0.5;

    // REMOVE DIVERGENCE
    vel -= (gradient * 2);
        let pos =
    vec2i(
        i32(gid.x),
        i32(gid.y)
    );
    textureStore(
        velocityWrite,
        pos,
        vec4f(
            vel,
            0.0,0.0
        )
    );
}

function createTexture(format) {

    return device.createTexture({

        size: [GRID_W, GRID_H],

        format,

        usage:
            GPUTextureUsage.STORAGE_BINDING |
            GPUTextureUsage.TEXTURE_BINDING |
            GPUTextureUsage.RENDER_ATTACHMENT |
            GPUTextureUsage.COPY_DST
    });

}

function createPingPong(format) {

    return {

        read: createTexture(format),
        write: createTexture(format)

    };

}
  
function swap(field) {

    [field.read, field.write] =
    [field.write, field.read];

let lastTime =
performance.now();

let frames = 0;


device.lost.then(info => {
    console.error("DEVICE LOST", info);
});

async function frame(now) {


    console.log("PLAYING")
    frames++;

    if (now - lastTime >= 500) {

        fpsText.textContent =
            "FPS: " +
            (
                frames * 1000 /
                (now - lastTime)
            ).toFixed(1);

        frames = 0;

        lastTime = now;
    }

    updateMouse();


    const encoder =
    device.createCommandEncoder();


    let computePass =
    encoder.beginComputePass();

    computePass.setPipeline(
        computePipeline
    );

    computePass.setBindGroup(
        0,
        uniformBind
    );
    

    computePass.setBindGroup(
        1,
        velocityBind
    );

    computePass.setBindGroup(
        2,
        dyeBind
    );
    computePass.setBindGroup(3, pressureBind);
    computePass.dispatchWorkgroups(
        Math.ceil(GRID_W / 8),
        Math.ceil(GRID_H / 8)
    );

    swap(velocity);
    velocityBind =
    createVelocityBind();

    
if(1 == 1) {

computePass.setPipeline(divergencePipeline);
computePass.setBindGroup(0, uniformBind);
computePass.setBindGroup(1, velocityBind);
computePass.setBindGroup(3, pressureBind);

computePass.dispatchWorkgroups(
    Math.ceil(GRID_W / 8),
    Math.ceil(GRID_H / 8)
);
swap(divergence);

}


if(1 == 1){
    computePass.setPipeline(
        pressurePipeline
    );
    for (let i = 0; i < 40; i++) {
    // Alternate between bind groups
    computePass.setBindGroup(3, pressureBind);
    computePass.dispatchWorkgroups(
    Math.ceil(GRID_W / 8),
    Math.ceil(GRID_H / 8));
    swap(pressure);  // Swap your buffer references
    pressureBind = createPressureBind(); // Recreate bind group with new buffer references
}   
}
if(1 == 1){
computePass.setPipeline(projectPipeline);
computePass.setBindGroup(0, uniformBind);
computePass.setBindGroup(1, velocityBind);
computePass.setBindGroup(3, pressureBind);
computePass.dispatchWorkgroups(
    Math.ceil(GRID_W / 8),
    Math.ceil(GRID_H / 8)
);
if(1 == 1){
    for (let i = 0; i < 10; i++) {
        computePass.setPipeline(mixPipeline);
    computePass.setBindGroup(0, uniformBind);
    computePass.setBindGroup(2, dyeBind);
    computePass.dispatchWorkgroups(
        Math.ceil(GRID_W / 8),
        Math.ceil(GRID_H / 8)
    );

}

}


}


    computePass.end();





    const renderPass =
    encoder.beginRenderPass({

        colorAttachments: [{

            view:
                context
                .getCurrentTexture()
                .createView(),

            clearValue: {
                r: 0,
                g: 0,
                b: 0,
                a: 1
            },

            loadOp: "clear",

            storeOp: "store"

        }]

    });

    renderPass.setPipeline(
        renderPipeline
    );

    renderPass.setBindGroup(
        0,
        uniformBind
    );

    renderPass.setBindGroup(1,velocityBind)

    renderPass.setBindGroup(
        2,
        dyeBind
    );
    renderPass.setBindGroup(3, pressureBind);


    renderPass.draw(6);

    renderPass.end();

    device.pushErrorScope("validation");

device.queue.submit([
    encoder.finish()
]);

const err =
    await device.popErrorScope();

console.log(err);

    swap(velocity);
    swap(dye);




// Destroy it

    velocityBind =
    createVelocityBind();

    dyeBind =
    createDyeBind();


    requestAnimationFrame(frame);

}

requestAnimationFrame(frame);

</script>
